<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 서비스 연대기 — Frontier Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent1: #7c3aed;
      --accent2: #2563eb;
      --accent3: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;

      /* Category colors */
      --cat-llm:    #7c3aed;
      --cat-image:  #db2777;
      --cat-code:   #16a34a;
      --cat-voice:  #d97706;
      --cat-video:  #dc2626;
      --cat-search: #0891b2;
      --cat-agent:  #7c3aed;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ─── GRADIENT BLOBS ─── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--accent1); top: -200px; left: -200px; animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent2); top: 40%; right: -150px; animation-delay: -7s; }
    .blob-3 { width: 400px; height: 400px; background: var(--accent3); bottom: -100px; left: 30%; animation-delay: -14s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 60px) scale(1.1); }
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(8,8,16,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.875rem; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); font-weight: 600; }
    .nav-cta {
      padding: 0.5rem 1.25rem;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border: none;
      border-radius: 999px;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      z-index: 1;
      padding: 10rem 1.5rem 5rem;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 1rem;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.125rem;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 2rem;
    }
    .hero-stats {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ─── FILTER BAR ─── */
    .filter-wrap {
      position: sticky;
      top: 64px;
      z-index: 90;
      background: rgba(8,8,16,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.5rem;
    }
    .filter-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-right: 0.25rem;
    }
    .filter-btn {
      padding: 0.35rem 0.875rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all .2s;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-btn.active {
      color: #fff;
      border-color: transparent;
    }
    .filter-btn[data-cat="all"].active   { background: linear-gradient(135deg, #7c3aed, #2563eb); }
    .filter-btn[data-cat="LLM"].active   { background: var(--cat-llm); }
    .filter-btn[data-cat="이미지"].active { background: var(--cat-image); }
    .filter-btn[data-cat="코딩"].active   { background: var(--cat-code); }
    .filter-btn[data-cat="음성"].active   { background: var(--cat-voice); }
    .filter-btn[data-cat="영상"].active   { background: var(--cat-video); }
    .filter-btn[data-cat="검색"].active   { background: var(--cat-search); }
    .filter-btn[data-cat="에이전트"].active { background: var(--cat-agent); }

    /* ─── TIMELINE CONTAINER ─── */
    .timeline-wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 8rem;
    }

    /* ─── YEAR SECTION ─── */
    .year-section { margin-bottom: 4rem; }
    .year-header {
      text-align: center;
      position: relative;
      margin-bottom: 3rem;
    }
    .year-label {
      display: inline-block;
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(96,165,250,0.15));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    .year-label::after {
      content: attr(data-year);
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.3;
    }
    .year-count {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
      letter-spacing: 0.05em;
    }
    .year-line {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      z-index: 0;
    }

    /* ─── CARDS GRID ─── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 2px 1fr;
      gap: 0;
      position: relative;
    }

    /* center line */
    .timeline-line {
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--border) 5%, var(--border) 95%, transparent);
      position: relative;
    }
    .timeline-line::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--accent1) 20%, var(--accent2) 80%, transparent);
      opacity: 0.4;
    }

    /* ─── CARD SLOTS ─── */
    .card-slot {
      padding: 0.75rem 2rem 0.75rem 0;
      display: flex;
      justify-content: flex-end;
    }
    .card-slot.right {
      padding: 0.75rem 0 0.75rem 2rem;
      justify-content: flex-start;
    }
    .card-slot.empty {
      visibility: hidden;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      width: 100%;
      max-width: 420px;
      transition: opacity 0.3s, transform 0.3s, border-color 0.2s;
      position: relative;
      overflow: hidden;
      cursor: default;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
      pointer-events: none;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .card.dimmed {
      opacity: 0.18;
      transform: scale(0.98);
    }

    /* scroll-driven animation */
    @supports (animation-timeline: view()) {
      .card {
        animation: card-enter linear both;
        animation-timeline: view();
        animation-range: entry 0% entry 25%;
      }
      @keyframes card-enter {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .card.dimmed {
        opacity: 0.18 !important;
        transform: scale(0.98) !important;
      }
    }

    /* IntersectionObserver fallback */
    @supports not (animation-timeline: view()) {
      .card {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.2s;
      }
      .card.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .card.dimmed {
        opacity: 0.18 !important;
        transform: scale(0.98) !important;
      }
    }

    /* connector dot */
    .card-slot::after {
      display: none;
    }

    /* ─── CARD CONTENT ─── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .card-icon {
      font-size: 1.75rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-meta { flex: 1; }
    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .card-company {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .card-impact {
      font-size: 0.7rem;
      color: #fbbf24;
      letter-spacing: -1px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .card-desc {
      font-size: 0.8rem;
      color: rgba(241,245,249,0.7);
      line-height: 1.55;
      margin-bottom: 0.875rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .cat-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.625rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #fff;
    }
    .cat-tag[data-cat="LLM"]   { background: rgba(124,58,237,0.35); border: 1px solid rgba(124,58,237,0.5); }
    .cat-tag[data-cat="이미지"] { background: rgba(219,39,119,0.35); border: 1px solid rgba(219,39,119,0.5); }
    .cat-tag[data-cat="코딩"]   { background: rgba(22,163,74,0.35);  border: 1px solid rgba(22,163,74,0.5); }
    .cat-tag[data-cat="음성"]   { background: rgba(217,119,6,0.35);  border: 1px solid rgba(217,119,6,0.5); }
    .cat-tag[data-cat="영상"]   { background: rgba(220,38,38,0.35);  border: 1px solid rgba(220,38,38,0.5); }
    .cat-tag[data-cat="검색"]   { background: rgba(8,145,178,0.35);  border: 1px solid rgba(8,145,178,0.5); }
    .cat-tag[data-cat="에이전트"]{ background: rgba(124,58,237,0.35); border: 1px solid rgba(124,58,237,0.5); }

    .card-date {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ─── MOBILE ─── */
    @media (max-width: 700px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
      .timeline-line { display: none; }
      .card-slot {
        padding: 0.5rem 0;
        justify-content: stretch;
      }
      .card-slot.right {
        padding: 0.5rem 0;
      }
      .card-slot.empty { display: none; }
      .card { max-width: 100%; }
      .year-label { font-size: 3rem; }
      .hero h1 { font-size: 2.2rem; }
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }
    footer a { color: #a78bfa; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ─── NO RESULTS ─── */
    .no-results {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      display: none;
    }
    .no-results.visible { display: block; }
  </style>
</head>

    // ─── RENDER ─────────────────────────────────────────────────────
    const timeline = document.getElementById('timeline');
    const noResults = document.getElementById('no-results');
    const statTotal = document.getElementById('stat-total');
    statTotal.textContent = SERVICES.length;

    function starsHtml(n) {
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    function renderTimeline(activeFilter) {
      timeline.innerHTML = '';
      const years = [2022, 2023, 2024, 2025, 2026];
      let totalVisible = 0;

      years.forEach(year => {
        const yearServices = SERVICES.filter(s => s.year === year);
        if (yearServices.length === 0) return;

        const section = document.createElement('div');
        section.className = 'year-section';

        const header = document.createElement('div');
        header.className = 'year-header';
        header.innerHTML = `
          <div class="year-line"></div>
          <div class="year-label" data-year="${year}">${year}</div>
          <div class="year-count">${yearServices.length}개 서비스</div>
        `;
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'cards-grid';
        const line = document.createElement('div');
        line.className = 'timeline-line';

        const leftSlots = [], rightSlots = [];
        yearServices.forEach((svc, i) => {
          if (i % 2 === 0) { leftSlots.push(svc); rightSlots.push(null); }
          else { leftSlots.push(null); rightSlots.push(svc); }
        });

        const leftCol = document.createElement('div');
        const rightCol = document.createElement('div');
        const rows = leftSlots.length;

        for (let i = 0; i < rows; i++) {
          const buildSlot = (svc, isRight) => {
            const slot = document.createElement('div');
            if (!svc) {
              slot.className = 'card-slot' + (isRight ? ' right' : '') + ' empty';
              slot.innerHTML = '<div class="card" style="visibility:hidden"></div>';
            } else {
              slot.className = 'card-slot' + (isRight ? ' right' : '');
              const isFiltered = activeFilter !== 'all' && svc.category !== activeFilter;
              slot.appendChild(buildCard(svc, isFiltered));
              if (!isFiltered) totalVisible++;
            }
            return slot;
          };
          leftCol.appendChild(buildSlot(leftSlots[i], false));
          rightCol.appendChild(buildSlot(rightSlots[i], true));
        }

        grid.appendChild(leftCol);
        grid.appendChild(line);
        grid.appendChild(rightCol);
        section.appendChild(grid);
        timeline.appendChild(section);
      });

      noResults.classList.toggle('visible', totalVisible === 0);

      if (!CSS.supports('animation-timeline', 'view()')) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
        }, { threshold: 0.1 });
        timeline.querySelectorAll('.card').forEach(c => {
          if (!c.classList.contains('dimmed')) observer.observe(c);
          else c.classList.add('visible');
        });
      }
    }

    function buildCard(svc, dimmed) {
      const card = document.createElement('div');
      card.className = 'card' + (dimmed ? ' dimmed' : '');
      card.dataset.category = svc.category;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon">${svc.icon}</div>
          <div class="card-meta">
            <div class="card-name">${svc.name}</div>
            <div class="card-company">${svc.company}</div>
          </div>
          <div class="card-impact">${starsHtml(svc.impact)}</div>
        </div>
        <div class="card-desc">${svc.desc}</div>
        <div class="card-footer">
          <span class="cat-tag" data-cat="${svc.category}">${svc.category}</span>
          <span class="card-date">${svc.date}</span>
        </div>
      `;
      return card;
    }

    let activeFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        renderTimeline(activeFilter);
      });
    });

    renderTimeline('all');
  </script>
